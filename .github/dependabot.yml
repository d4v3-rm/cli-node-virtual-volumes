version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Rome
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
